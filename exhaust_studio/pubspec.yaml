name: exhaust_studio
description: ExhaustStudio 650 - Motorcycle exhaust audio enhancer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video picking from gallery
  image_picker: ^1.1.2

  # Video playback in-app
  video_player: ^2.9.1

  # FFmpeg audio processing (LTS bundle includes audio + video filters)
  ffmpeg_kit_flutter_video: ^6.0.3

  # Permissions handling (camera roll / storage)
  permission_handler: ^11.3.1

  # Path utilities
  path_provider: ^2.1.4
  path: ^1.9.0

flutter:
  uses-material-design: true
