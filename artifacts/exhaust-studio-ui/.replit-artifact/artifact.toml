kind = "web"
previewPath = "/"
title = "ExhaustStudio 650"
version = "1.0.0"
id = "artifacts/exhaust-studio-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20832

[services.development]
run = "pnpm --filter @workspace/exhaust-studio-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exhaust-studio-ui", "run", "build" ]
publicDir = "artifacts/exhaust-studio-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20832"
BASE_PATH = "/"
